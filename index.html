<!DOCTYPE html>
<html>
<head>
    <title>UK Precision Weather</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #003366; color: white; text-align: center; padding: 20px; }
        .card { background: white; color: #333; display: inline-block; padding: 40px; border-radius: 2px; border-top: 8px solid #ffcc00; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .city { font-size: 1.2em; letter-spacing: 2px; text-transform: uppercase; color: #666; }
        .main-temp { font-size: 5em; font-weight: bold; margin: 10px 0; color: #003366; }
        .sub-info { border-top: 1px solid #eee; margin-top: 20px; padding-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em; text-align: left; }
        input { width: 60%; padding: 10px; border: 1px solid #ccc; }
        button { padding: 10px; background: #003366; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div style="margin-bottom: 20px;">
        <input type="text" id="cityInput" placeholder="Enter City...">
        <button onclick="update()">Search</button>
    </div>

    <div class="card">
        <div class="city" id="cityName">LONDON</div>
        <div class="main-temp"><span id="temp">--</span>°</div>
        <div style="font-weight: bold;" id="desc">CLEAR SKY</div>
        
        <div class="sub-info">
            <div>Feels Like: <b id="feels">--</b>°C</div>
            <div>Wind: <b id="wind">--</b> mph</div>
            <div>Humidity: <b id="hum">--</b>%</div>
            <div>Pressure: <b id="press">--</b></div>
        </div>
    </div>

    <script>
        async function update() {
            const city = document.getElementById('cityInput').value || 'London';
            const res = await fetch(`/api/weather/${city}`);
            const d = await res.json();
            if(!d.error) {
                document.getElementById('cityName').innerText = d.city;
                document.getElementById('temp').innerText = d.temp;
                document.getElementById('feels').innerText = d.feels_like;
                document.getElementById('wind').innerText = d.wind;
                document.getElementById('hum').innerText = d.humidity;
                document.getElementById('press').innerText = d.pressure;
                document.getElementById('desc').innerText = d.desc;
            }
        }
        update();
    </script>
</body>
</html>

load();
</script>

</body>
</html>
<div class="search-box" style="background: #1a1f26; border-left: 4px solid #ffcc00;">
    <input type="text" id="chatIdInput" placeholder="Enter Telegram Chat ID">
    <input type="number" id="thresholdInput" placeholder="Alert Temp (°C)" style="width: 100px;">
    <button onclick="setAlert()" style="background: #ffcc00; color: #333;">Set Alert</button>
</div>

<script>
    // 原有的 updateData 函数保持不变...

    async function setAlert() {
        const chatId = document.getElementById('chatIdInput').value;
        const city = document.getElementById('cityInput').value || 'London';
        const threshold = document.getElementById('thresholdInput').value;

        if(!chatId) return alert("Please enter your Telegram Chat ID first!");

        const res = await fetch('/api/alert', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chatId, city, threshold })
        });
        const result = await res.json();
        if(result.success) alert(`Alert set for ${city} at ${threshold}°C!`);
    }
</script>
