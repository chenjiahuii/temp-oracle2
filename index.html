<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Met-Pro 精准实测</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #ffcc00; --bg: #0f172a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 90%; max-width: 800px; background: rgba(30,41,59,0.8); border-radius: 24px; padding: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .temp-val { font-size: 7rem; font-weight: 800; margin: 0; line-height: 1; }
        .max-tag { color: var(--accent); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 8px; font-weight: bold; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>
<div class="card">
    <div style="display: flex; justify-content: space-between;">
        <div>
            <h2 id="cityName" style="color:#94a3b8; margin:0; letter-spacing:1px">LONDON</h2>
            <p class="temp-val"><span id="curTemp">--</span>°</p >
            <div class="max-tag">今日实测最高：<span id="maxTemp">--</span>°C</div>
        </div>
        <div style="text-align:right">
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px;">
                <small style="color:#64748b">实测风速</small>
                <div id="windSpd" style="font-size:1.6rem; font-weight:bold">--</div>
            </div>
            <p id="obsTime" style="font-size:0.8rem; color:#64748b; margin-top:20px">气象站同步: --</p >
        </div>
    </div>
    <div style="height: 300px; margin-top: 40px;"><canvas id="mainChart"></canvas></div>
</div>

<script>
    let chart;
    async function refresh() {
        const res = await fetch(`/api/weather/London`);
        const d = await res.json();
        
        document.getElementById('curTemp').innerText = d.temp;
        document.getElementById('maxTemp').innerText = d.temp_max;
        document.getElementById('windSpd').innerText = d.wind + ' mph';
        document.getElementById('obsTime').innerText = "数据观测时刻: " + d.obs_time;
        
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chart) chart.destroy();
        
        // 坐标轴改为具体的时间点
        const labels = ['09:00', '11:00', '13:00', '15:00', 'Now'];
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: [11.5, 12.6, d.temp_max, 13.5, d.temp],
                    borderColor: '#ffcc00',
                    backgroundColor: 'rgba(255,204,0,0.1)',
                    fill: true, tension: 0.4,
                    pointRadius: 6, pointHoverRadius: 10
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: { enabled: true } // 鼠标悬停显示 13.x 这种带小数点的数
                },
                scales: { 
                    y: { display: false }, 
                    x: { ticks: { color: '#64748b', font: { size: 14 } }, grid: { display: false } } 
                }
            }
        });
    }
    refresh();
</script>
</body>
</html>
