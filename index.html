<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伦敦精准实测温</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { font-size: 1.2rem; opacity: 0.7; margin-bottom: 0.5rem; text-transform: uppercase; }
        .temp-main { font-size: 5rem; font-weight: bold; margin: 1rem 0; }
        .temp-unit { font-size: 2rem; vertical-align: super; }
        .stats { display: flex; justify-content: space-around; margin-top: 2rem; font-size: 0.9rem; }
        .stat-item { opacity: 0.8; }
        .high-tag {
            background: #f1c40f;
            color: #000;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .time { font-size: 0.7rem; opacity: 0.5; margin-top: 1.5rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>London</h1>
        <div class="temp-main">
            <span id="temp">--.-</span><span class="temp-unit">°</span>
        </div>
        <div>
            <span class="high-tag">今日实测最高: <span id="temp_max">--.-</span>°C</span>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div>实测风速</div>
                <div style="font-weight: bold; margin-top: 5px;"><span id="wind">--</span> mph</div>
            </div>
        </div>

        <div class="time">数据观测时刻: <span id="obs_time">正在获取...</span></div>
    </div>

    <script>
        async function updateWeather() {
            try {
                // 使用相对路径，这样无论 Railway 给什么端口都能自动对接
                const response = await fetch('/api/weather/London');
                const data = await response.json();
                
                if (data.error) {
                    console.error('API 报错:', data.error);
                    return;
                }

                // 更新 HTML 元素
                document.getElementById('temp').innerText = data.temp;
                document.getElementById('temp_max').innerText = data.temp_max;
                document.getElementById('wind').innerText = data.wind;
                document.getElementById('obs_time').innerText = data.obs_time;
                
            } catch (error) {
                console.error('无法连接到后端:', error);
                document.getElementById('obs_time').innerText = '连接失败，请检查端口设置';
            }
        }

        // 立即执行一次
        updateWeather();
        // 每 5 分钟自动刷新一次数据
        setInterval(updateWeather, 300000);
    </script>
</body>
</html>
