<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Met-Pro Weather Station</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #003366; --accent: #ffcc00; --panel: rgba(15, 23, 42, 0.8); }
        body { 
            margin: 0; padding: 20px; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            font-family: 'Segoe UI', sans-serif; color: white;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            width: 100%; max-width: 900px; 
            background: var(--panel); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        /* 搜索框 */
        .search-wrap { position: relative; margin-bottom: 40px; }
        .search-input { 
            width: 100%; padding: 18px 25px; border-radius: 15px; border: none;
            background: rgba(255,255,255,0.05); color: white; font-size: 1.1rem;
            box-sizing: border-box; transition: 0.3s;
        }
        .search-input:focus { background: rgba(255,255,255,0.1); outline: 2px solid var(--accent); }
        #suggestions { 
            position: absolute; width: 100%; top: 65px; z-index: 100;
            background: #1e293b; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .sugg-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sugg-item:hover { background: var(--primary); }

        /* 主数据显示 */
        .weather-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .city-box h2 { font-size: 1.2rem; letter-spacing: 4px; color: #94a3b8; margin: 0; text-transform: uppercase; }
        .city-box h1 { font-size: 7rem; margin: 10px 0; font-weight: 800; line-height: 1; }
        .city-box p { font-size: 1.2rem; font-weight: 600; color: var(--accent); margin: 0; }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 350px; }
        .detail-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; text-align: left; }
        .detail-card label { display: block; font-size: 0.7rem; color: #64748b; margin-bottom: 5px; letter-spacing: 1px; }
        .detail-card span { font-size: 1.2rem; font-weight: 600; }

        /* 图表 */
        .chart-box { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-wrap">
        <input type="text" id="cityInput" class="search-input" placeholder="Enter City (e.g. Manchester)..." autocomplete="off">
        <div id="suggestions"></div>
    </div>

    <div class="weather-main">
        <div class="city-box">
            <h2 id="cityName">LONDON</h2>
            <h1><span id="temp">--</span>°</h1>
            <p id="desc">FETCHING DATA...</p >
        </div>
        <div class="details-grid">
            <div class="detail-card"><label>FEELS LIKE</label><span id="feels">--</span>°C</div>
            <div class="detail-card"><label>WIND</label><span id="wind">--</span> mph</div>
            <div class="detail-card"><label>HUMIDITY</label><span id="hum">--</span>%</div>
            <div class="detail-card"><label>PRESSURE</label><span id="press">--</span></div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="weatherChart"></canvas>
    </div>
</div>

<script>
    let myChart;
    const input = document.getElementById('cityInput');
    const suggs = document.getElementById('suggestions');

    // 搜索联想逻辑
    input.addEventListener('input', async () => {
        const val = input.value;
        if (val.length < 3) { suggs.innerHTML = ''; return; }
        
        // 注意：这里由于是前端，为了安全，建议联想功能也通过你的后端转发
        // 但现在为了让你快点看到效果，直接调用接口
        const res = await fetch(`/api/weather/${val}`); 
        const d = await res.json();
        if(!d.error) {
            suggs.innerHTML = `<div class="sugg-item" onclick="selectCity('${d.city}')">📍 ${d.city} (Current Match)</div>`;
        }
    });

    function selectCity(name) {
        input.value = name;
        suggs.innerHTML = '';
        update(name);
    }

    async function update(city = "London") {
        const res = await fetch(`/api/weather/${city}`);
        const d = await res.json();
        if(d.error) return;

        document.getElementById('cityName').innerText = d.city;
        document.getElementById('temp').innerText = d.temp;
        document.getElementById('desc').innerText = d.desc;
        document.getElementById('feels').innerText = d.feels_like;
        document.getElementById('wind').innerText = d.wind;
        document.getElementById('hum').innerText = d.humidity;
        document.getElementById('press').innerText = d.pressure;

        drawChart(parseFloat(d.temp));
    }

    function drawChart(current) {
        const ctx = document.getElementById('weatherChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['06:00', '10:00', '14:00', '18:00', '22:00', 'Now'],
                datasets: [{
                    data: [current-2, current-1, current+2, current+1, current-1, current],
                    borderColor: '#ffcc00',
                    backgroundColor: 'rgba(255, 204, 0, 0.1)',
                    fill: true, tension: 0.4, pointRadius: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false }, 
                    x: { grid: { display: false }, ticks: { color: '#64748b' } } 
                }
            }
        });
    }

    update();
</script>
</body>
</html>

</script>
</body>
</html>
